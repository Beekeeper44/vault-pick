<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vault Pick</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#0a0e14; --surface:#0f141c; --surface2:#141b25; --line:#1e2733; --line2:#161d27;
    --ink:#e7edf5; --muted:#aab4c4; --accent:#22d669; --accent-dk:#17b455; --accent-ink:#04120a;
    --bad:#ef4444; --amber:#e0a53a;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  body.light{--bg:#f4f6f8;--surface:#fff;--surface2:#f6f8fb;--line:#e2e6ec;--line2:#eef1f5;--ink:#0f131a;--muted:#3d4655;color-scheme:light}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--mono);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:17px;font-weight:600;color-scheme:dark}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}
  .g{color:var(--accent)}

  /* Login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
  .login-card{background:var(--surface);width:100%;max-width:390px;border:1px solid var(--line);border-radius:14px;padding:32px 30px}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo{flex:none;height:52px;width:auto;display:block}
  .wm h1{font-family:var(--sans);font-size:28px;margin:0;font-weight:800;letter-spacing:-.5px;line-height:1}
  .wm .sub{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-top:6px}
  label.fld{display:block;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:18px 0 7px}
  input[type=text],input[type=password],input[type=number],input[type=date],select{
    width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-weight:600;background:var(--bg);color:var(--ink);font-family:var(--mono)}
  input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,214,105,.18)}
  .btn{background:var(--accent);color:var(--accent-ink);border:none;border-radius:9px;padding:12px 15px;font-weight:800;font-size:14px;width:100%;font-family:var(--sans);letter-spacing:.3px}
  .btn:hover{background:var(--accent-dk)}
  .btn.sm{width:auto;padding:9px 14px;font-size:12.5px;text-transform:uppercase;letter-spacing:1px}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
  .err{color:#ff8080;font-size:13px;margin-top:12px;min-height:16px;font-weight:700}
  .hint{margin-top:20px;font-size:11.5px;color:var(--muted);background:var(--bg);border:1px dashed var(--line);border-radius:9px;padding:11px 12px;line-height:1.7}
  .hint b{color:var(--ink)}
  #login .login-card{max-width:580px;padding:56px 52px}
  #login .brand{gap:20px;margin-bottom:14px}
  #login .logo{height:84px}
  #login .wm h1{font-size:46px}
  #login .wm .sub{font-size:15px;letter-spacing:1.2px;margin-top:10px}
  #login label.fld{font-size:14px;margin:24px 0 9px}
  #login input[type=text],#login input[type=password]{padding:18px 18px;font-size:19px;border-radius:12px}
  #login .btn{padding:18px;font-size:19px;border-radius:12px;margin-top:16px}
  #login .err{font-size:15px}
  #login .hint{font-size:14px;padding:16px 18px;margin-top:26px;line-height:1.8}

  /* Shell */
  .wrap{max-width:none;margin:0;padding:24px 42px}
  .top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
  .hr{display:flex;align-items:center;gap:14px}
  .who{font-size:13px;color:var(--muted);letter-spacing:.5px}
  .who b{color:var(--ink)}
  .iconbtn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:50%;width:34px;height:34px;font-size:15px}
  .iconbtn:hover{border-color:var(--accent);color:var(--accent)}
  .linkbtn{background:none;border:none;color:var(--muted);font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
  .linkbtn:hover{color:var(--accent)}

  .tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .tab{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:12px 24px;font-family:var(--mono);font-size:15px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent}
  .tab:hover{color:var(--ink);border-color:var(--muted)}
  .tab.on{color:var(--accent-ink);background:var(--accent);border-color:var(--accent)}

  .stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:16px 18px;min-width:150px;flex:1}
  .stat .n{font-size:38px;font-weight:800;line-height:1;font-family:var(--sans)}
  .stat .l{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1.4px;margin-top:10px}
  .stat.hl .n{color:var(--accent)}

  .filters{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:14px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
  .fg{display:flex;flex-direction:column}
  .fg > span{font-size:11.5px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1.3px;margin-bottom:7px}
  .range{display:flex;align-items:center;gap:6px}
  .range input{width:98px}
  .filters .grow{flex:1;min-width:190px}
  .filters .grow input{width:100%}
  .filters .right{margin-left:auto;display:flex;gap:8px;align-items:flex-end}
  .count{font-size:12px;color:var(--muted);align-self:center;letter-spacing:.5px}

  /* Table */
  .tablecard{background:var(--surface);border:1px solid var(--line);border-radius:11px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;font-size:16px}
  thead th{text-align:left;color:var(--muted);font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:1.3px;padding:14px 16px;border-bottom:1px solid var(--line)}
  tbody td{padding:15px 16px;border-bottom:1px solid var(--line2);vertical-align:middle;font-weight:700}
  tbody tr.data{cursor:pointer}
  tbody tr.data:hover{background:var(--surface2)}
  tbody tr.data.mine{box-shadow:inset 3px 0 0 var(--accent)}
  tbody tr.binok{background:rgba(34,214,105,.07)}
  .mono{font-family:var(--mono);font-weight:700}
  .binlink{color:var(--accent);font-family:var(--mono);font-weight:800;font-size:17px}
  .bincell{display:flex;align-items:center;gap:13px}
  .binword{font-weight:800;color:var(--ink);font-size:16px;white-space:nowrap}
  .binqr{width:42px;height:42px;background:#fff;border:1px solid var(--line);border-radius:6px;display:grid;place-items:center;overflow:hidden;flex:none}
  tr.data:hover .binlink{text-decoration:underline}
  .pill{display:inline-block;font-size:13.5px;font-weight:800;padding:5px 12px;border-radius:999px}
  .pill.d-lo{background:rgba(34,214,105,.16);color:#5fe08a}
  .pill.d-md{background:rgba(224,165,58,.16);color:#f0b84a}
  .pill.d-hi{background:rgba(239,68,68,.16);color:#ff8585}
  .st{display:inline-block;font-size:12px;font-weight:800;padding:4px 10px;border-radius:6px;white-space:nowrap;margin:1px;text-transform:uppercase;letter-spacing:.5px}
  .st.ship{background:rgba(80,140,255,.16);color:#7ea8ff}
  .st.ext{background:rgba(147,102,255,.16);color:#a78bff}
  .st.issue{background:rgba(148,163,184,.16);color:#9aa4b2}
  .prg{display:inline-block;font-size:13px;font-weight:800;padding:5px 12px;border-radius:999px;background:var(--surface2);color:var(--muted)}
  .prg.done{background:rgba(34,214,105,.16);color:#5fe08a}
  .prg.done-f{background:rgba(239,68,68,.16);color:#ff8585}
  .prg.ok{background:var(--accent);color:var(--accent-ink)}
  .actcell{white-space:nowrap;text-align:right}
  .rowassign{font-family:var(--mono);font-size:16px;font-weight:800;color:var(--muted);margin-right:12px}
  .rowassign.mine{color:var(--accent)}
  .exp{background:transparent;border:1px solid var(--accent);border-radius:8px;padding:6px 12px;color:var(--accent);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px}
  .exp:hover{background:var(--accent);color:var(--accent-ink)}
  .opentip{color:var(--muted);font-size:12px;font-weight:700;font-family:var(--mono);opacity:.65}
  .sechead{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
  .sechead .achev{color:var(--muted);font-size:13px;transition:transform .15s;flex:none}
  .sechead .achev.col{transform:rotate(-90deg)}
  .secbody{margin-top:14px}

  tr.group td{background:var(--surface2);border-bottom:1px solid var(--line);padding:0}
  tr.group.gassigned td{background:rgba(234,179,8,.16)}
  tr.group.gdone td{background:rgba(34,214,105,.16)}
  .grp{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer;user-select:none}
  .grp.gassigned{box-shadow:inset 5px 0 0 #eab308}
  .grp.gdone{box-shadow:inset 5px 0 0 var(--accent)}
  .grp .chev{transition:transform .15s;color:var(--muted);font-size:12px;width:14px}
  .grp.collapsed .chev{transform:rotate(-90deg)}
  .grp .rng{font-weight:800;font-family:var(--mono);font-size:19px;color:var(--ink)}
  .grp .meta{color:var(--muted);font-size:15px;font-weight:700}
  .grp .meta b{color:var(--ink);font-weight:800}
  .gright{margin-left:auto;display:flex;align-items:center;gap:14px}
  .gassign{font-size:18px;font-weight:800;color:var(--ink);white-space:nowrap}
  .gassign b{font-weight:800;color:var(--accent)}
  .gassign.unassigned{color:var(--muted)}
  .gassign.split{color:var(--ink);font-size:16px;white-space:nowrap}
  .gassign.split b{color:#eab308}
  .gstat{display:inline-block;font-size:12px;font-weight:800;padding:5px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:.6px;margin-left:10px;font-family:var(--mono);vertical-align:middle}
  .gstat.prog{background:rgba(234,179,8,.16);color:#eab308}
  .gstat.done{background:rgba(34,214,105,.16);color:#5fe08a}
  .claimbtn{border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:8px;padding:9px 16px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.8px}
  .gassignsel{background:var(--surface);border:1px solid var(--accent);color:var(--ink);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:800;font-family:var(--mono);cursor:pointer}
  .gassignsel:hover{border-color:var(--accent)}
  .binassignsel{background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 10px;font-size:14px;font-weight:800;font-family:var(--mono);cursor:pointer;margin-right:10px}
  .binassignsel:hover{border-color:var(--accent)}
  .vgin{width:96px;background:var(--surface);border:1px solid var(--accent);color:var(--ink);border-radius:8px;padding:7px 10px;font-size:14px;font-weight:800;font-family:var(--mono)}
  .claimbtn:hover{background:rgba(34,214,105,.12)}
  .claimbtn.mine{background:var(--accent);color:var(--accent-ink)}

  /* Modals */
  .modal-bg{position:fixed;inset:0;background:rgba(4,7,12,.72);display:grid;place-items:center;z-index:50;padding:20px}
  .binmodal{background:var(--surface);border:1px solid var(--line);border-radius:14px;width:98vw;max-width:98vw;max-height:96vh;overflow:auto}
  .bm-head{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--line);padding:18px 22px;display:flex;justify-content:space-between;align-items:flex-start;gap:22px;z-index:2}
  .bm-head h2{margin:0;font-size:30px;font-weight:800;font-family:var(--sans)}
  .bm-head .sub{margin-top:8px;font-size:16px;color:var(--muted);font-weight:700}
  .bm-head .sub b{color:var(--ink);font-weight:800}
  .assign{margin-top:11px;font-size:16.5px;font-weight:800}
  .bm-headL{flex:1;min-width:0}
  .scanbin{display:flex;flex-direction:column;align-items:center;gap:6px}
  .scanqr{width:92px;height:92px;background:#fff;border-radius:8px;display:grid;place-items:center;overflow:hidden}
  .scanbin span{font-size:11px;letter-spacing:1.4px;color:var(--muted);font-weight:800}
  .assign .who2{display:inline-block;background:rgba(34,214,105,.14);color:var(--accent);padding:3px 11px;border-radius:999px;font-weight:800}
  .xbtn{border:1px solid var(--line);background:transparent;border-radius:9px;width:36px;height:36px;font-size:20px;color:var(--muted);flex:none}
  .xbtn:hover{border-color:var(--accent);color:var(--accent)}
  .bm-body{padding:16px 22px 22px}
  .donebanner{background:rgba(34,214,105,.12);border:1px solid rgba(34,214,105,.4);color:var(--accent);font-weight:800;font-size:13.5px;border-radius:10px;padding:11px 14px;margin-bottom:14px}
  .bm-actions{display:flex;gap:9px;flex-wrap:wrap;margin:4px 0 16px}

  table.cardtbl{width:100%;border-collapse:collapse;font-size:17px;background:var(--bg);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  table.cardtbl th{text-align:left;color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:1.1px;font-weight:800;padding:14px 14px;border-bottom:1px solid var(--line)}
  table.cardtbl td{padding:16px 14px;border-bottom:1px solid var(--line2);font-weight:700}
  table.cardtbl tr:last-child td{border-bottom:none}
  table.cardtbl tr.picked{background:rgba(34,214,105,.08)}
  table.cardtbl tr.flagged{background:rgba(239,68,68,.09)}
  .clickme{color:var(--accent);font-weight:800;text-decoration:none;font-size:16px}
  .clickme:hover{text-decoration:underline}
  .qr{width:62px;height:62px;background:#fff;border:1px solid var(--line);border-radius:6px;display:grid;place-items:center;cursor:pointer;overflow:hidden}
  .hqr{width:46px;height:46px;cursor:default}
  .htdate{display:flex;flex-direction:column;gap:2px;white-space:nowrap}
  .htdate b{font-size:15px;font-weight:800}
  .htdate span{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
  .pickerlink{color:var(--accent);font-weight:800;cursor:pointer;background:none;border:none;font-family:var(--mono);font-size:inherit;padding:0}
  .pickerlink:hover{text-decoration:underline}
  .backbtn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--mono)}
  .backbtn:hover{border-color:var(--accent)}
  .linklike{background:none;border:none;color:var(--accent);font-weight:800;cursor:pointer;font-size:13px;padding:0;font-family:var(--mono)}
  .linklike:hover{text-decoration:underline}
  .resetask{margin-top:16px;text-align:center}
  #resetForm{margin-top:12px;text-align:left}
  .ok{color:var(--accent);font-size:13px;font-weight:700;margin-top:8px}
  .iconbtn.notif{position:relative}
  .badge{position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;font-size:11px;font-weight:800;min-width:18px;height:18px;border-radius:999px;display:grid;place-items:center;padding:0 4px;font-family:var(--mono);line-height:1}
  .reqbadge{display:inline-block;background:#ef4444;color:#fff;font-size:12px;font-weight:800;border-radius:999px;padding:1px 9px;margin-left:8px;font-family:var(--mono);vertical-align:middle}
  .trackbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .tracksearch{background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 13px;font-size:14px;font-weight:700;font-family:var(--mono);min-width:230px}
  .tracksearch:focus{outline:none;border-color:var(--accent)}
  .trackshow{color:var(--muted);font-family:var(--mono);font-size:13px}
  .trackshow b{color:var(--accent)}
  .qr:hover{outline:2px solid var(--accent)}
  .pk,.fl{border-radius:8px;padding:10px 16px;font-size:14px;font-weight:800;border:2px solid;background:transparent;margin-right:6px;text-transform:uppercase;letter-spacing:.5px}
  .pk{color:#46d17d;border-color:rgba(34,214,105,.5)}
  .pk.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .fl{color:#ef6b6b;border-color:rgba(239,68,68,.5)}
  .fl.on{background:var(--bad);color:#fff;border-color:var(--bad)}

  h4.sec{margin:18px 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:800}
  .logrow{display:flex;gap:12px;align-items:baseline;padding:7px 0;border-bottom:1px dashed var(--line2)}
  .logrow:last-of-type{border-bottom:none}
  .logrow .lu{font-weight:800;color:var(--accent);font-size:12.5px;min-width:74px}
  .logrow .lt{color:var(--muted);font-size:12px;min-width:170px;font-family:var(--mono)}
  .logrow .ln{font-size:14px;font-weight:600}
  .addnote{display:flex;gap:8px;margin-top:12px;max-width:600px}
  .addnote input{flex:1}

  .qrmodal{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:26px;max-width:340px;width:100%;text-align:center}
  .qrmodal .qrbig{width:230px;height:230px;margin:6px auto 16px;display:grid;place-items:center;background:#fff;border-radius:8px}
  .qrmodal h3{margin:0 0 6px;font-size:19px;font-weight:800;font-family:var(--sans)}
  .qrmodal p{margin:3px 0;color:var(--muted);font-size:13px;font-weight:600}
  .qrmodal p b{color:var(--ink);font-family:var(--mono);font-weight:800}
  .empty{padding:44px;text-align:center;color:var(--muted);font-weight:600;font-size:14px}

  .histgrid{display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start}
  @media(max-width:900px){.histgrid{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:18px}
  .calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .calnav b{font-size:15px;font-weight:800;font-family:var(--sans);text-transform:uppercase;letter-spacing:1px}
  .calnav button{border:1px solid var(--line);background:transparent;border-radius:8px;width:34px;height:34px;font-size:16px;color:var(--muted);font-weight:800}
  .calnav button:hover{border-color:var(--accent);color:var(--accent)}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal .dow{text-align:center;font-size:10.5px;font-weight:800;color:var(--muted);padding:4px 0;letter-spacing:1px}
  .cal-cell{position:relative;min-height:50px;border:1px solid var(--line2);border-radius:9px;padding:6px 7px;cursor:pointer;background:var(--bg)}
  .cal-cell.empty{border:none;background:transparent;cursor:default}
  .cal-cell .dn{font-size:13.5px;color:var(--ink);font-weight:800}
  .cal-cell.has{border-color:rgba(34,214,105,.4);background:rgba(34,214,105,.06)}
  .cal-cell.today{box-shadow:inset 0 0 0 2px var(--line)}
  .cal-cell.sel{box-shadow:inset 0 0 0 2px var(--accent)}
  .cal-cell .cc{position:absolute;right:5px;bottom:5px;background:var(--accent);color:var(--accent-ink);font-size:10.5px;font-weight:800;border-radius:999px;padding:1px 7px}
  .jump{margin-top:14px}
  .jump span{font-size:10.5px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1.2px;display:block;margin-bottom:6px}
  .daysum{font-size:15px;color:var(--muted);margin-bottom:12px;font-weight:700}
  .daysum b{color:var(--ink);font-weight:800}
  .histtoggle{display:flex;gap:6px}
  .httog{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px}
  .httog.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .asec{margin:0 0 14px;font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:800}
  .createrow{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
  .rolepill{display:inline-block;font-size:12px;font-weight:800;padding:4px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:.6px;background:var(--surface2);color:var(--muted)}
  .rolepill.admin{background:rgba(34,214,105,.16);color:#5fe08a}
  .youtag{background:rgba(34,214,105,.16);color:#5fe08a;font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:6px;text-transform:uppercase;margin-left:8px}
  .btn.ghost.danger{color:#ef6b6b;border-color:rgba(239,68,68,.4)}
  .btn.ghost.danger:hover{background:rgba(239,68,68,.12);border-color:#ef6b6b}
  .act{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px}
  .act.picked{background:rgba(34,214,105,.16);color:#46d17d}
  .act.flagged{background:rgba(239,68,68,.16);color:#ef6b6b}
  .cardscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

  /* ---- Responsive: desktop / iPad / mobile ---- */
  @media(max-width:1180px){
    .wrap{padding:20px 24px}
  }
  @media(max-width:900px){          /* iPad portrait & down */
    .wrap{padding:16px 18px}
    .top{flex-direction:column;align-items:flex-start;gap:12px}
    .hr{width:100%;justify-content:flex-start}
    .stat{flex:1 1 calc(50% - 7px);min-width:calc(50% - 7px)}
    .stat .n{font-size:32px}
    .filters{gap:12px}
    .fg.grow{flex:1 1 100%}
    .filters .right{margin-left:0}
    .count{margin-left:auto}
    table{min-width:680px}
    table.cardtbl{min-width:720px}
    .bm-head{padding:16px 16px}
    .bm-body{padding:14px 16px 18px}
    .histgrid{grid-template-columns:1fr}
  }
  @media(max-width:560px){          /* phones */
    .wrap{padding:12px 12px}
    .wm h1{font-size:22px}
    .stat{flex:1 1 100%;min-width:100%}
    .tabs{gap:8px}
    .pk,.fl{padding:9px 11px;margin-bottom:4px}
    .exp,.claimbtn{padding:9px 12px}
    .bm-actions .btn{flex:1 1 100%}
  }
</style>
</head>

function buildCards(){
  const cards=[]; let idx=0, ord=15016300, nb=0;
  BIN_GROUPS.forEach(([lo,hi],gi)=>{
    const nBins=4;
    for(let bx=0;bx<nBins;bx++){
      const bin_id=lo+Math.round((hi-lo)*(bx+1)/(nBins+1));
      const bin_name=BIN_NAMES[(nb++)%BIN_NAMES.length];
      const n=1+((bin_id+bx)%5); const used=new Set();
      for(let k=0;k<n;k++){
        let slot=((bin_id*7+k*29)%100)+1; while(used.has(slot)) slot=(slot%100)+1; used.add(slot);
        const r=(bin_id+k)%7;
        const st=r===6?'pending_data_issue':(r%2===0?'pending_external_checkout':'pending_shipping');
        ord+=3+((bin_id+k)%40);
        cards.push({id:'K'+(idx++),url:'https://arenaclub.com/card/'+(100000+idx),card_status:st,
          order_number:ord,bin_id,bin_name,slot,player_name:PLAYERS[(bin_id+k)%PLAYERS.length],
          ac:'8AC-'+(20000+idx),in_process_days:(bin_id%4===0)?0:((bin_id+k)%4)});
      }
    }
  });
  return cards;
}

const MB={ apiPath:'/api/picking', useLive:true };
function mapRow(r,i){
  const g=(...keys)=>{for(const k of keys){if(r[k]!==undefined&&r[k]!==null&&r[k]!=='')return r[k];}return undefined;};
  return {
    id: g('id','ID','card_id') ?? `${g('order_number','order')||''}-${g('bin_id','bin')||''}-${g('slot')||''}-${i}`,
    url: g('url','URL','label_url')||'#',
    label_qr: g('label_qr','qr','url')||'',
    card_status: g('card_status','status')||'',
    order_number: g('order_number','order','order_no')||'',
    bin_id: Number(g('bin_id','bin')||0),
    bin_name: g('bin_name','bin_label')||'',
    slot: Number(g('slot','slot_number')||0),
    player_name: g('player_name','player','subject')||'',
    ac: g('ac','8ac','8AC','ac_number')||'',
    in_process_days: Number(g('in_process_days','ipd','days_in_process')||0)
  };
}

const DB={ enabled:true, token:null, ready:false };
async function api(path,opts={}){
  const headers=Object.assign({'Content-Type':'application/json'},opts.headers||{});
  if(DB.token)headers['Authorization']='Bearer '+DB.token;
  const res=await fetch(path,Object.assign({},opts,{headers}));
  if(!res.ok){let d='';try{d=(await res.json()).error||'';}catch(_){}throw new Error('HTTP '+res.status+(d?' — '+d:''));}
  return res.status===204?null:res.json();
}
// fire-and-forget writes: only when DB is live; never block the UI

async function hydrateFromDb(){
  try{
    const b=await api('/api/bootstrap');
    if(Array.isArray(b.vaultGroups)&&b.vaultGroups.length){BIN_GROUPS.length=0;b.vaultGroups.forEach(g=>BIN_GROUPS.push(g));}
    if(Array.isArray(b.users)&&b.users.length){for(const k in USERS)delete USERS[k];TEAM.length=0;
      b.users.forEach(u=>{USERS[u.username]={role:u.role,name:u.name,pw:''};TEAM.push(u.username);});}
    for(const k in assignedTo)delete assignedTo[k];
    (b.assignments||[]).forEach(a=>{assignedTo[a.bin_id]=a.username;});
    for(const k in pickState)delete pickState[k];
    (b.pickState||[]).forEach(p=>{pickState[p.card_id]=p.state;});
    for(const k in binDone)delete binDone[k];
    (b.completions||[]).forEach(c=>{binDone[c.bin_id]={date:c.day,time:'',user:c.username};});
    resetRequests.length=0;
    (b.resetRequests||[]).forEach(r=>resetRequests.push({id:r.id,username:r.username,note:r.note,ts:new Date(Number(r.ts)),status:r.status}));
    pickSessions.length=0;
    (b.sessions||[]).forEach(s=>pickSessions.push({bin_id:s.bin_id,bin_name:s.bin_name,user:s.username,cards:s.cards,start:new Date(Number(s.start_ms)),end:new Date(Number(s.end_ms)),ms:Number(s.ms),date:s.day}));
    if(Array.isArray(b.history)){history.length=0;
      b.history.forEach(h=>{const d=new Date(Number(h.ts));history.push({ts:d,date:h.day,time:ptTimeStr(d),user:h.username,action:h.action,url:h.url,bin_id:h.bin_id,bin_name:h.bin_name,slot:h.slot,order_number:h.order_number,player_name:h.player_name,card_status:h.card_status,ac:h.ac,in_process_days:h.in_process_days});});}
    DB.ready=true;
    BIN_GROUPS.forEach((_,i)=>collapsed[i]=true);
    $('sub').textContent='signed in as '+currentUser+' · '+currentRole+' · Neon storage';
    updateNotif(); populateIPDFilter(); render();
    console.log('Vault Pick: hydrated from Neon');
  }catch(e){ console.warn('Vault Pick: DB hydrate failed, using local state →',e.message); }
}

/* FILTER + GROUP */
function getFilteredCards(){
  const from=parseInt($('binFrom').value),to=parseInt($('binTo').value),ipd=$('ipdFilter').value,q=$('search').value.trim().toLowerCase();
  return CARDS.filter(c=>{
    if(!PICKABLE.includes(c.card_status)) return false;
    if(currentRole!=='admin' && assignedTo[c.bin_id]!==currentUser) return false;   // employees: only their assigned bins
    if(!isNaN(from)&&c.bin_id<from) return false;
    if(!isNaN(to)&&c.bin_id>to) return false;
    if(ipd!=='all'&&c.in_process_days!==parseInt(ipd)) return false;
    if(q){const hay=(c.bin_id+' '+c.bin_name+' '+c.order_number+' '+c.player_name+' '+c.card_status).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
}
function binProgress(cards){let p=0,f=0;cards.forEach(c=>{const s=pickState[c.id];if(s==='picked')p++;else if(s==='flagged')f++;});return{p,f,t:cards.length};}

function markDone(bid){const now=new Date();
  const picker=assignedTo[bid]||currentUser;   // credit the bin's assigned picker (supports split groups)
  binDone[bid]={date:ptDateStr(now),time:ptTimeStr(now),user:picker};
  const t=binTiming[bid];
  const name=(binMap[bid]&&binMap[bid][0])?binMap[bid][0].bin_name:'';
  const cards=(binMap[bid]||[]).length;
  if(t){
    pickSessions.push({bin_id:bid,bin_name:name,user:picker,cards,start:t.start,end:now,ms:now-t.start,date:ptDateStr(now)});
    persist(()=>DB.done({bin_id:bid,bin_name:name,cards,start:t.start.getTime(),end:now.getTime(),ms:now-t.start,username:picker}));
    delete binTiming[bid];
  } else {
    persist(()=>DB.done({bin_id:bid,bin_name:name,cards,username:picker}));
  }
}

/* TRACKER */
function trackerStats(S){
  const bins=S.length, cards=S.reduce((s,x)=>s+x.cards,0), ms=S.reduce((s,x)=>s+x.ms,0);
  return {bins,cards,ms,cph:ms>0?(cards/(ms/3600000)):0,avgMs:bins?ms/bins:0};
}
function sessionRows(S){
  return S.map(x=>`<tr>
      <td class="bincell"><span class="binword">Bin <span class="binlink">${x.bin_id}</span></span></td>
      <td>${x.bin_name}</td><td><button class="pickerlink" data-tuser="${x.user}">${x.user}</button></td><td>${x.cards}</td>
      <td class="mono">${ptTimeStr(x.start)}</td><td class="mono">${ptTimeStr(x.end)}</td>
      <td class="mono"><b>${fmtDur(x.ms)}</b></td></tr>`).join('')
    ||'<tr><td colspan="7" class="empty">No completed picks yet. Open a bin and hit Complete bin to start tracking.</td></tr>';
}
function statCards(t){
  return `<div class="stats">
      <div class="stat"><div class="n">${t.bins}</div><div class="l">Bins completed</div></div>
      <div class="stat"><div class="n">${t.cards}</div><div class="l">Cards picked</div></div>
      <div class="stat"><div class="n">${fmtDur(t.ms)}</div><div class="l">Total time picked</div></div>
      <div class="stat"><div class="n">${fmtDur(t.avgMs)}</div><div class="l">Avg time / bin</div></div>
      <div class="stat hl"><div class="n">${t.cph.toFixed(1)}</div><div class="l">Cards / hour</div></div>
    </div>`;
}

function renderTracker(){
  $('pickView').classList.add('hidden'); $('historyView').classList.add('hidden'); $('adminView').classList.add('hidden'); $('trackerView').classList.remove('hidden');
  const today=todayPT();
  const inPeriod=ds=>{
    if(trackerPeriod==='all')return true;
    if(trackerPeriod==='today')return ds===today;
    if(trackerPeriod==='day')return ds===trackerDate;
    if(trackerPeriod==='month')return ds.slice(0,7)===today.slice(0,7);
    if(trackerPeriod==='week')return weekStart(ds)===weekStart(today);
    return true;
  };
  const base=pickSessions.filter(x=>inPeriod(x.date)).sort((a,b)=>b.end-a.end);
  const everyone=[...new Set([...TEAM,...pickSessions.map(x=>x.user)])].sort();
  const opts=everyone.map(u=>`<option value="${u}"></option>`).join('');
  const periodLabel = trackerPeriod==='today'?'today':trackerPeriod==='week'?'this week':trackerPeriod==='month'?'this month':trackerPeriod==='day'?shortDate(trackerDate):'all time';
  const periods=[['today','Today'],['week','This week'],['month','This month'],['all','All time']];
  const pbtns=periods.map(([k,l])=>`<button class="httog ${trackerPeriod===k?'on':''}" data-tp="${k}">${l}</button>`).join('');
  const bar=`<div class="trackbar">
      <span class="asec" style="margin:0">View</span>
      <input id="trackerSearch" list="trackerUsers" placeholder="Search a picker…" value="${trackerUser||''}" class="tracksearch" autocomplete="off"/>
      <datalist id="trackerUsers">${opts}</datalist>
      <button class="backbtn" id="trackerTeam">Team stats</button>
      <span class="trackshow">Showing <b>${trackerUser||'whole team'}</b> · <b>${periodLabel}</b></span>
    </div>
    <div class="trackbar" style="margin-bottom:18px">
      <span class="asec" style="margin:0">Period</span>
      <div class="histtoggle">${pbtns}</div>
      <span class="asec" style="margin:0">or pick a day</span>
      <input type="date" id="trackerDay" value="${trackerPeriod==='day'?(trackerDate||''):''}" class="tracksearch" style="min-width:0"/>
    </div>`;

  // ---- single-person detail ----
  if(trackerUser){
    const S=base.filter(x=>x.user===trackerUser);
    const t=trackerStats(S);
    $('trackerView').innerHTML=bar+`
      ${statCards(t)}
      <div class="asec" style="margin:20px 0 12px">${trackerUser} · ${periodLabel} — completed bin picks (Pacific)</div>
      <div class="tablecard">
        <table><thead><tr><th>Bin</th><th>Bin Name</th><th>Picker</th><th>Cards</th><th>Start</th><th>End</th><th>Total Time</th></tr></thead>
          <tbody>${sessionRows(S)}</tbody></table>
      </div>`;
    return;
  }

  // ---- team overview ----
  const t=trackerStats(base);
  const byUser={};
  base.forEach(x=>{const u=byUser[x.user]=byUser[x.user]||{bins:0,cards:0,ms:0};u.bins++;u.cards+=x.cards;u.ms+=x.ms;});
  const userRows=Object.keys(byUser).sort((a,b)=>byUser[b].cards-byUser[a].cards).map(u=>{
    const d=byUser[u], c=d.ms>0?(d.cards/(d.ms/3600000)):0;
    return `<tr><td><button class="pickerlink" data-tuser="${u}">${u}</button></td><td>${d.bins}</td><td>${d.cards}</td>
      <td class="mono">${fmtDur(d.ms)}</td><td class="mono">${fmtDur(d.bins?d.ms/d.bins:0)}</td>
      <td><b style="color:var(--accent)">${c.toFixed(1)}</b></td></tr>`;
  }).join('')||'<tr><td colspan="6" class="empty">No completed picks in this period.</td></tr>';

  $('trackerView').innerHTML=bar+`
    ${statCards(t)}
    <div class="asec" style="margin:20px 0 12px">By team member · ${periodLabel} <span style="text-transform:none;letter-spacing:0;color:var(--muted);font-weight:600">— search above or click a name for their stats</span></div>
    <div class="tablecard" style="margin-bottom:20px">
      <table><thead><tr><th>Picker</th><th>Bins</th><th>Cards</th><th>Total time</th><th>Avg / bin</th><th>Cards / hr</th></tr></thead>
        <tbody>${userRows}</tbody></table>
    </div>
    <div class="asec" style="margin:20px 0 12px">Completed bin picks · ${periodLabel} — start &amp; end (Pacific)</div>
    <div class="tablecard">
      <table><thead><tr><th>Bin</th><th>Bin Name</th><th>Picker</th><th>Cards</th><th>Start</th><th>End</th><th>Total Time</th></tr></thead>
        <tbody>${sessionRows(base)}</tbody></table>
    </div>`;
}

    const allMine=bins.length>0&&bins.every(bid=>assignedTo[bid]===currentUser);
    bins.forEach(bid=>{if(allMine)delete assignedTo[bid];else assignedTo[bid]=currentUser;});renderPick();return;}
  const grp=e.target.closest('.grp'); if(grp){const g=grp.dataset.g;collapsed[g]=!collapsed[g];renderPick();return;}
  const op=e.target.closest('[data-open]'); if(op){openBinModal(+op.dataset.open);}
});
$('tbody').addEventListener('change',e=>{
  const gs=e.target.closest('[data-gsel]'); if(gs){const gi=+gs.dataset.gsel,v=gs.value,bins=binsInGroup(gi);
    if(v==='__clear'){bins.forEach(bid=>delete assignedTo[bid]); persist(()=>DB.assign(bins,null));}
    else if(v){bins.forEach(bid=>assignedTo[bid]=v); persist(()=>DB.assign(bins,v));}
    renderPick();return;}
  const bs=e.target.closest('[data-bsel]'); if(bs){const bid=+bs.dataset.bsel,v=bs.value;
    if(v)assignedTo[bid]=v; else delete assignedTo[bid];
    persist(()=>DB.assign([bid], v||null));
    renderPick();return;}
});

$('binModal').addEventListener('click',e=>{
  if(e.target.id==='binModal'){closeBinModal();return;}
  if(e.target.closest('#bmClose')){closeBinModal();return;}
  const pk=e.target.closest('[data-pick]'); if(pk){const c=CARDS.find(x=>x.id===pk.dataset.pick);
    if(pickState[c.id]==='picked'){delete pickState[c.id];persist(()=>DB.pick(c.id,c.bin_id,null,c));}
    else{pickState[c.id]='picked';logEvent(c,'picked');persist(()=>DB.pick(c.id,c.bin_id,'picked',c));}afterAction();return;}
  const fl=e.target.closest('[data-flag]'); if(fl){const c=CARDS.find(x=>x.id===fl.dataset.flag);
    if(pickState[c.id]==='flagged'){delete pickState[c.id];persist(()=>DB.pick(c.id,c.bin_id,null,c));}
    else{pickState[c.id]='flagged';logEvent(c,'flagged');persist(()=>DB.pick(c.id,c.bin_id,'flagged',c));}afterAction();return;}
  const cf=e.target.closest('[data-confirm]'); if(cf){const bid=+cf.dataset.confirm;
    (binMap[bid]||[]).forEach(c=>{if(pickState[c.id]!=='picked'){pickState[c.id]='picked';logEvent(c,'picked');persist(()=>DB.pick(c.id,c.bin_id,'picked',c));}});markDone(bid);afterAction();return;}
  const cp=e.target.closest('[data-complete]'); if(cp){const bid=+cp.dataset.complete;
    (binMap[bid]||[]).forEach(c=>{if(!pickState[c.id]){pickState[c.id]='picked';logEvent(c,'picked');persist(()=>DB.pick(c.id,c.bin_id,'picked',c));}});markDone(bid);afterAction();return;}
  const rs=e.target.closest('[data-reset]'); if(rs){const bid=+rs.dataset.reset;
    (binMap[bid]||[]).forEach(c=>{delete pickState[c.id];persist(()=>DB.pick(c.id,c.bin_id,null,c));});delete binDone[bid];afterAction();return;}
  const add=e.target.closest('[data-add]'); if(add){const bid=+add.dataset.add,inp=$('ni-'+bid),v=inp.value.trim();if(!v)return;
    (binLogs[bid]=binLogs[bid]||[]).push({user:currentUser,time:ptTimeStr(new Date()),note:v});renderBinModal();return;}
  const qr=e.target.closest('.qr'); if(qr){openQR(qr.dataset.card);}
});

$('historyView').addEventListener('click',e=>{
  const hf=e.target.closest('[data-hf]'); if(hf){histFilter=hf.dataset.hf;renderHistory();return;}
  if(e.target.closest('[data-prevm]')){calM--;if(calM<0){calM=11;calY--;}renderHistory();return;}
  if(e.target.closest('[data-nextm]')){calM++;if(calM>11){calM=0;calY++;}renderHistory();return;}
  const day=e.target.closest('[data-day]'); if(day){selectedDate=day.dataset.day;renderHistory();}
});
$('historyView').addEventListener('change',e=>{if(e.target.id==='jumpDate'){selectedDate=e.target.value;const[a,b]=selectedDate.split('-').map(Number);calY=a;calM=b-1;renderHistory();}});

$('trackerView').addEventListener('click',e=>{
  const tp=e.target.closest('[data-tp]'); if(tp){trackerPeriod=tp.dataset.tp; if(trackerPeriod!=='day')trackerDate=null; renderTracker();return;}
  const tu=e.target.closest('[data-tuser]'); if(tu){trackerUser=tu.dataset.tuser;renderTracker();return;}
  if(e.target.closest('#trackerTeam')||e.target.closest('#trackerBack')){trackerUser=null;renderTracker();return;}
});
$('trackerView').addEventListener('change',e=>{
  if(e.target.id==='trackerSearch'){
    const v=e.target.value.trim().toLowerCase();
    const match=[...new Set([...TEAM,...pickSessions.map(x=>x.user)])].find(u=>u.toLowerCase()===v);
    trackerUser=match||null; renderTracker(); return;
  }
  if(e.target.id==='trackerDay'){
    if(e.target.value){trackerPeriod='day';trackerDate=e.target.value;} else {trackerPeriod='all';trackerDate=null;}
    renderTracker(); return;
  }
});
$('trackerView').addEventListener('keydown',e=>{
  if(e.target.id==='trackerSearch' && (e.key===' '||e.key==='Escape')){e.preventDefault();e.target.value='';trackerUser=null;renderTracker();}
});

$('adminView').addEventListener('click',e=>{
  if(currentRole!=='admin')return;
  const sh=e.target.closest('[data-asec]'); if(sh){adminCol[sh.dataset.asec]=!adminCol[sh.dataset.asec];renderAdmin();return;}
  if(e.target.closest('#vgAdd')){
    const lo=parseInt($('vgFrom').value,10), hi=parseInt($('vgTo').value,10);
    if(!Number.isInteger(lo)||!Number.isInteger(hi)){$('vgErr').textContent='Enter both a From and To bin number.';return;}
    if(hi<=lo){$('vgErr').textContent='"To" must be greater than "From".';return;}
    if(BIN_GROUPS.some(([a,b])=>lo<=b&&hi>=a)){$('vgErr').textContent='That range overlaps an existing vault group.';return;}
    BIN_GROUPS.push([lo,hi]); BIN_GROUPS.sort((a,b)=>a[0]-b[0]); persist(()=>DB.vgAdd(lo,hi)); renderAdmin(); return;
  }
  const dg=e.target.closest('[data-delgroup]'); if(dg){const[dlo,dhi]=BIN_GROUPS[+dg.dataset.delgroup]||[];BIN_GROUPS.splice(+dg.dataset.delgroup,1);persist(()=>DB.vgDel(dlo,dhi));renderAdmin();return;}
  const eg=e.target.closest('[data-editgroup]'); if(eg){vgEdit.add(+eg.dataset.editgroup);renderAdmin();return;}
  const cg=e.target.closest('[data-cancelgroup]'); if(cg){vgEdit.delete(+cg.dataset.cancelgroup);renderAdmin();return;}
  const sg=e.target.closest('[data-savegroup]'); if(sg){const i=+sg.dataset.savegroup;
    const lo=parseInt($('vgf-'+i).value,10), hi=parseInt($('vgt-'+i).value,10);
    if(!Number.isInteger(lo)||!Number.isInteger(hi)){$('vgErr').textContent='Enter both a From and To bin number.';return;}
    if(hi<=lo){$('vgErr').textContent='"To" must be greater than "From".';return;}
    if(BIN_GROUPS.some((g,j)=>j!==i && lo<=g[1] && hi>=g[0])){$('vgErr').textContent='That range overlaps another vault group.';return;}
    const [oldLo,oldHi]=BIN_GROUPS[i]; BIN_GROUPS[i]=[lo,hi]; BIN_GROUPS.sort((a,b)=>a[0]-b[0]); vgEdit.clear();
    persist(async()=>{await DB.vgDel(oldLo,oldHi); await DB.vgAdd(lo,hi);});
    renderAdmin(); return;}
  const ff=e.target.closest('[data-fulfill]'); if(ff){const r=resetRequests.find(x=>x.id===+ff.dataset.fulfill);
    if(!r)return; const v=$('rqpw-'+r.id).value.trim();
    if(!v){$('reqErr').textContent='Enter a new password for '+r.username+'.';return;}
    if(USERS[r.username])USERS[r.username].pw=v; r.status='resolved';
    persist(()=>DB.reqSet(r.id,'resolved',v)); renderAdmin(); updateNotif(); return;}
  const dr=e.target.closest('[data-dismissreq]'); if(dr){const r=resetRequests.find(x=>x.id===+dr.dataset.dismissreq);
    if(r){r.status='dismissed'; persist(()=>DB.reqSet(r.id,'dismissed'));} renderAdmin(); updateNotif(); return;}
  if(e.target.closest('#naCreate')){
    const u=$('naUser').value.trim().toLowerCase(), n=$('naName').value.trim(), p=$('naPass').value, r=$('naRole').value;
    if(!u||!p){$('naErr').textContent='Username and password are required.';return;}
    if(!/^[a-z0-9_.]+$/.test(u)){$('naErr').textContent='Username can use letters, numbers, _ or . only.';return;}
    if(USERS[u]){$('naErr').textContent='That username already exists.';return;}
    USERS[u]={pw:p,role:r,name:n||u}; if(!TEAM.includes(u))TEAM.push(u);
    persist(()=>DB.userNew({username:u,name:n||u,role:r,password:p})); renderAdmin(); return;
  }
  const rp=e.target.closest('[data-resetpw]'); if(rp){pwEdit.add(rp.dataset.resetpw);renderAdmin();return;}
  const cp=e.target.closest('[data-cancelpw]'); if(cp){pwEdit.delete(cp.dataset.cancelpw);renderAdmin();return;}
  const sp=e.target.closest('[data-savepw]'); if(sp){const u=sp.dataset.savepw,v=$('pw-'+u).value.trim();
    if(v){USERS[u].pw=v;persist(()=>DB.userSet({username:u,password:v}));}pwEdit.delete(u);renderAdmin();return;}
  const adminCount=()=>Object.values(USERS).filter(x=>x.role==='admin').length;
  const rl=e.target.closest('[data-role]'); if(rl){const u=rl.dataset.role;
    if(USERS[u].role==='admin'&&adminCount()<=1){$('naErr').textContent='Keep at least one admin.';return;}
    USERS[u].role=USERS[u].role==='admin'?'employee':'admin';
    persist(()=>DB.userSet({username:u,role:USERS[u].role}));renderAdmin();return;}
  const dl=e.target.closest('[data-del]'); if(dl){const u=dl.dataset.del;
    if(u===currentUser)return;
    if(USERS[u].role==='admin'&&adminCount()<=1){$('naErr').textContent='Keep at least one admin.';return;}
    delete USERS[u]; const i=TEAM.indexOf(u); if(i>=0)TEAM.splice(i,1); pwEdit.delete(u);
    persist(()=>DB.userDel(u)); renderAdmin();return;}
});

/* QR modal */
function openQR(cid){const c=CARDS.find(x=>x.id===cid);
  $('qrPlayer').textContent=c.player_name;$('qrBin').textContent=c.bin_id+' ('+c.bin_name+')';
  $('qrSlot').textContent=c.slot;$('qrOrder').textContent=c.order_number;
  $('qrStatus').innerHTML=`<span class="st ${stClass(c.card_status)}">${stPretty(c.card_status)}</span>`;
  const box=$('qrBig');box.innerHTML='';
  try{new QRCode(box,{text:c.url,width:220,height:220,correctLevel:QRCode.CorrectLevel.M});}catch(e){box.innerHTML='<span class="mono" style="color:#000">'+c.url+'</span>';}
  $('qrModal').classList.remove('hidden');}
$('qrClose').onclick=()=>$('qrModal').classList.add('hidden');
$('qrModal').addEventListener('click',e=>{if(e.target.id==='qrModal')$('qrModal').classList.add('hidden');});
</script>
